name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set POM version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} --batch-mode --no-transfer-progress

      - name: Build and test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Prepare release artifact
        run: cp bom-migrate-cli/target/bom-migrate-cli-${{ steps.version.outputs.VERSION }}.jar bom-migrate-${{ steps.version.outputs.VERSION }}.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: bom-migrate-${{ steps.version.outputs.VERSION }}.jar
