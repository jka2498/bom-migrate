name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set POM version
        run: mvn versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} --batch-mode --no-transfer-progress

      - name: Build and test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Prepare release artifact
        run: cp bom-migrate-cli/target/bom-migrate-cli-${{ steps.version.outputs.VERSION }}.jar bom-migrate-${{ steps.version.outputs.VERSION }}.jar

      - name: Create tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: bom-migrate-${{ steps.version.outputs.VERSION }}.jar

      - name: Compute next SNAPSHOT version
        id: next
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          NEXT="${major}.$((minor + 1)).0-SNAPSHOT"
          echo "NEXT_VERSION=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump main to next SNAPSHOT
        run: |
          git checkout main
          git pull origin main
          mvn versions:set -DnewVersion=${{ steps.next.outputs.NEXT_VERSION }} --batch-mode --no-transfer-progress
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml bom-migrate-core/pom.xml bom-migrate-cli/pom.xml
          git commit -m "chore: bump version to ${{ steps.next.outputs.NEXT_VERSION }} [skip ci]"
          git push origin main
