name: CI

on:
  push:
    branches: [ main, 'chore/bump-*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['17', '21', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Upload fat JAR
        if: success() && matrix.java == '21'
        uses: actions/upload-artifact@v7
        with:
          name: bom-migrate-cli
          path: bom-migrate-cli/target/bom-migrate-cli-*.jar
          if-no-files-found: error
          retention-days: 14
