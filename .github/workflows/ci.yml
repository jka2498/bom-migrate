name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Upload fat JAR
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: bom-migrate-cli
          path: bom-migrate-cli/target/bom-migrate-cli-*.jar
          if-no-files-found: error
          retention-days: 14
