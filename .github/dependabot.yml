version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "deps:"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "ci:"
    open-pull-requests-limit: 5
