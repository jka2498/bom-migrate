version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "deps:"
    open-pull-requests-limit: 5
    groups:
      maven-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: "ci:"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
